<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookBridge YouTube Thumbnail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1280px;
            height: 720px;
            overflow: hidden;
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            position: relative;
        }
        
        .container {
            width: 1280px;
            height: 720px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 80px;
        }
        
        /* Book Icon */
        .book-icon {
            position: absolute;
            top: 80px;
            left: 80px;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .book-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 8px rgba(255, 255, 0, 0.3));
        }
        
        /* Main Title */
        .main-title {
            font-size: 96px;
            font-weight: 900;
            color: #FFD700;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 1.1;
            margin-bottom: 20px;
            text-shadow: 
                0 0 20px rgba(255, 215, 0, 0.5),
                0 4px 8px rgba(0, 0, 0, 0.8),
                0 8px 16px rgba(0, 0, 0, 0.6);
            font-family: 'Arial Black', 'Arial', sans-serif;
        }
        
        /* Subtitle */
        .subtitle {
            font-size: 48px;
            font-weight: 700;
            color: #FFFFFF;
            text-align: center;
            margin-bottom: 100px;
            text-shadow: 
                0 2px 4px rgba(0, 0, 0, 0.8),
                0 4px 8px rgba(0, 0, 0, 0.6);
            letter-spacing: 1px;
        }
        
        /* Bottom Text */
        .bottom-text {
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 32px;
            font-weight: 600;
            color: #FFD700;
            text-shadow: 
                0 0 10px rgba(255, 215, 0, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.8);
            letter-spacing: 0.5px;
        }
        
        /* Decorative Elements */
        .decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        /* Accent Lines */
        .accent-line {
            position: absolute;
            height: 4px;
            background: linear-gradient(90deg, transparent, #FFD700, transparent);
            opacity: 0.6;
        }
        
        .accent-line.top {
            top: 40px;
            left: 10%;
            right: 10%;
        }
        
        .accent-line.bottom {
            bottom: 40px;
            left: 10%;
            right: 10%;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Decorative Glow -->
        <div class="decoration">
            <div class="glow"></div>
            <div class="accent-line top"></div>
            <div class="accent-line bottom"></div>
        </div>
        
        <!-- Book Icon -->
        <div class="book-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
                <defs>
                    <linearGradient id="bookGrad" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#FFD700"/>
                        <stop offset="100%" stop-color="#FFA500"/>
                    </linearGradient>
                </defs>
                <rect x="40" y="44" rx="18" ry="18" width="176" height="168" fill="url(#bookGrad)"/>
                <rect x="60" y="64" width="64" height="128" rx="10" ry="10" fill="#FFFFFF" opacity="0.9"/>
                <rect x="132" y="64" width="64" height="128" rx="10" ry="10" fill="#FFFFFF" opacity="0.7"/>
                <path d="M132 64 L132 192" stroke="#FFD700" stroke-width="3"/>
                <path d="M92 64 L92 110 L108 100 L124 110 L124 64 Z" fill="#0f172a" opacity="0.8"/>
            </svg>
        </div>
        
        <!-- Main Title -->
        <h1 class="main-title">Learn English<br>FAST</h1>
        
        <!-- Subtitle -->
        <h2 class="subtitle">One Expert Method</h2>
        
        <!-- Bottom Text -->
        <div class="bottom-text">BookBridge - 100+ Books FREE</div>
    </div>
</body>
</html>
