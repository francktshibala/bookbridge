<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookBridge Instagram Cover Photo - Neo-Classic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Serif Pro', Georgia, serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #F4F1EB; /* Warm parchment - Light theme */
            padding: 20px;
        }

        .cover-container {
            width: 1080px;
            height: 1080px;
            position: relative;
            /* Neo-Classic Light Theme Colors */
            background: linear-gradient(135deg, #F4F1EB 0%, #FFFFFF 50%, #FBF9F5 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            box-shadow: 
                0 20px 60px rgba(44, 24, 16, 0.15),
                0 4px 12px rgba(44, 24, 16, 0.1);
            overflow: hidden;
            border: 2px solid #E5DDD4; /* Light border */
        }

        /* Elegant background pattern */
        .cover-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 33, 71, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(205, 127, 50, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Decorative corner accent */
        .cover-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, rgba(0, 33, 71, 0.1) 0%, transparent 70%);
            border-bottom-right-radius: 100%;
        }

        .main-text {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 64px;
            font-weight: 700;
            color: #002147; /* Oxford blue - text accent */
            text-align: center;
            line-height: 1.3;
            z-index: 2;
            letter-spacing: -0.5px;
            max-width: 900px;
        }

        .main-text .highlight {
            color: #002147; /* Oxford blue */
            font-weight: 800;
            display: inline-block;
            position: relative;
        }

        .main-text .highlight::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #CD7F32 0%, #B8860B 100%); /* Bronze to gold */
            opacity: 0.4;
            z-index: -1;
        }

        .subtitle {
            font-family: 'Source Serif Pro', Georgia, serif;
            font-size: 32px;
            font-weight: 400;
            color: #5D4E37; /* Medium brown - text secondary */
            text-align: center;
            margin-top: 40px;
            z-index: 2;
            letter-spacing: 0.3px;
            font-style: italic;
        }

        .brand-accent {
            position: absolute;
            bottom: 60px;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 28px;
            font-weight: 600;
            color: #CD7F32; /* Bronze accent */
            z-index: 2;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Decorative book icons - Neo-Classic style */
        .book-icon {
            position: absolute;
            font-size: 120px;
            opacity: 0.08;
            z-index: 1;
            color: #002147; /* Oxford blue */
        }

        .book-icon:nth-child(1) {
            top: 100px;
            left: 80px;
            transform: rotate(-15deg);
        }

        .book-icon:nth-child(2) {
            bottom: 100px;
            right: 80px;
            transform: rotate(15deg);
        }

        /* Elegant divider line */
        .divider {
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #CD7F32 50%, transparent 100%);
            margin: 30px 0;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="cover-container">
        <!-- Decorative book icons -->
        <div class="book-icon">📚</div>
        <div class="book-icon">🎧</div>

        <!-- Main heading -->
        <h1 class="main-text">
            <span class="highlight">Learn English Quickly</span><br>
            By Reading And Listening<br>
            To Easy Books and<br>
            Native Speakers Voices<br>
            <span style="font-size: 0.9em; font-weight: 600; color: #5D4E37;">Naration</span>
        </h1>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Subtitle -->
        <p class="subtitle">
            Master English Through Stories
        </p>

        <!-- Brand accent -->
        <div class="brand-accent">BookBridge.app</div>
    </div>
</body>
</html>
